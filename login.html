<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TCS ILP Study Guide</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-error {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .3);
      color: #f87171;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 14px;
      display: none;
      text-align: center;
      animation: shake .35s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .login-card h1 .sub-title {
      display: block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      -webkit-text-fill-color: var(--text-dim);
      background: none;
      margin-top: 4px;
    }
    .btn-primary:disabled,
    .btn-google:disabled {
      opacity: .55;
      pointer-events: none;
    }
    .btn-primary .spinner,
    .btn-google .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>
        TCS ILP <span>Ultimate</span>
        <span class="sub-title">Study Guide</span>
      </h1>
      <p class="login-sub" id="loginSubtitle">Sign in to track your progress</p>

      <form id="authForm" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="authBtn">Sign In</button>
      </form>

      <div class="login-error" id="errorBox"></div>

      <div class="divider-text">or continue with</div>

      <button class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google
      </button>

      <div class="login-footer">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" id="toggleLink">Sign Up</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      createUserWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    /* ── Init ── */
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ── DOM ── */
    const form       = document.getElementById("authForm");
    const emailIn    = document.getElementById("email");
    const passIn     = document.getElementById("password");
    const authBtn    = document.getElementById("authBtn");
    const googleBtn  = document.getElementById("googleBtn");
    const errorBox   = document.getElementById("errorBox");
    const toggleLink = document.getElementById("toggleLink");
    const toggleText = document.getElementById("toggleText");
    const subtitle   = document.getElementById("loginSubtitle");

    let isSignUp = false;

    /* ── Auto-redirect if already logged in ── */
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "index.html";
    });

    /* ── Toggle Sign In / Sign Up ── */
    toggleLink.addEventListener("click", (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      if (isSignUp) {
        authBtn.textContent    = "Create Account";
        toggleText.textContent = "Already have an account?";
        toggleLink.textContent = "Sign In";
        subtitle.textContent   = "Create an account to get started";
      } else {
        authBtn.textContent    = "Sign In";
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = "Sign Up";
        subtitle.textContent   = "Sign in to track your progress";
      }
      hideError();
    });

    /* ── Save user to Firestore ── */
    async function saveUser(user) {
      try {
        await setDoc(doc(db, "users", user.uid), {
          uid:         user.uid,
          email:       user.email,
          displayName: user.displayName || user.email.split("@")[0],
          lastLogin:   serverTimestamp()
        }, { merge: true });
      } catch (_) { /* silent — auth succeeded, Firestore save is best-effort */ }
    }

    /* ── Error helpers ── */
    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
      /* re-trigger shake */
      errorBox.style.animation = "none";
      errorBox.offsetHeight;
      errorBox.style.animation = "";
    }
    function hideError() {
      errorBox.style.display = "none";
    }

    function friendlyError(code) {
      const map = {
        "auth/invalid-email":          "Enter a valid email address.",
        "auth/user-disabled":          "This account has been disabled.",
        "auth/user-not-found":         "No account found with this email.",
        "auth/wrong-password":         "Incorrect password. Try again.",
        "auth/invalid-credential":     "Invalid email or password.",
        "auth/email-already-in-use":   "This email is already registered. Sign in instead.",
        "auth/weak-password":          "Password must be at least 6 characters.",
        "auth/too-many-requests":      "Too many attempts. Wait a moment and try again.",
        "auth/popup-closed-by-user":   "Google sign-in was cancelled.",
        "auth/network-request-failed": "Network error. Check your connection.",
      };
      return map[code] || "Something went wrong. Please try again.";
    }

    /* ── Loading state ── */
    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.dataset.original = btn.innerHTML;
        const label = btn === googleBtn ? "Google" : (isSignUp ? "Creating..." : "Signing in...");
        btn.innerHTML = '<span class="spinner"></span>' + label;
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.original;
      }
    }

    /* ── Email/Password Auth ── */
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      setLoading(authBtn, true);

      try {
        const fn = isSignUp ? createUserWithEmailAndPassword : signInWithEmailAndPassword;
        const { user } = await fn(auth, emailIn.value.trim(), passIn.value);
        await saveUser(user);
        window.location.href = "index.html";
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(authBtn, false);
      }
    });

    /* ── Google Auth ── */
    googleBtn.addEventListener("click", async () => {
      hideError();
      setLoading(googleBtn, true);

      try {
        const provider = new GoogleAuthProvider();
        const { user }  = await signInWithPopup(auth, provider);
        await saveUser(user);
        window.location.href = "index.html";
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(googleBtn, false);
      }
    });
  </script>
</body>
</html>
